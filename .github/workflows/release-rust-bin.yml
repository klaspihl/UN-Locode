name: Release Rust Binary

on:
  push:
    tags:
      - 'rust-bin-v*'

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from Cargo.toml
        id: get_version
        run: |
          VERSION=$(grep '^version =' rust-bin/Cargo.toml | head -1 | cut -d '"' -f2)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build binary with Docker
        run: |
          docker build -t rust-unlocode:release ./rust-bin
          docker create --name temp-export rust-unlocode:release
          docker cp temp-export:/app/find-unlocation ./find-unlocation
          docker rm temp-export

      - name: Upload Release Asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: rust-bin-v${{ steps.get_version.outputs.version }}
          name: find-unlocation ${{ steps.get_version.outputs.version }}
          files: ./find-unlocation
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
